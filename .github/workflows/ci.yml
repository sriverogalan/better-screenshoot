name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync version from root package.json
        if: github.event_name == 'pull_request'
        run: node scripts/sync-version.mjs

      - name: Verify versions are in sync
        if: github.event_name != 'pull_request'
        run: node scripts/sync-version.mjs --check

      - name: Commit synced version files
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync version from package.json"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

  frontend:
    needs: [sync-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm test

  rust:
    needs: [sync-version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p capture-core
      - run: cargo check -p better-screenshoot --manifest-path apps/desktop/src-tauri/Cargo.toml

  ci-success:
    name: ci-success
    needs: [sync-version, frontend, rust]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.sync-version.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
