name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm test

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p capture-core
      - run: cargo build -p better-screenshoot-cli

  tauri-build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install
      - run: pnpm --filter @better-screenshoot/desktop build
      - run: pnpm --filter @better-screenshoot/desktop tauri build --target ${{ matrix.target }}
        env:
          CI: true

  ci-success:
    name: ci-success
    needs: [frontend, rust, tauri-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.tauri-build.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
